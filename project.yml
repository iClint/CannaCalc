name: CocoFeed
options:
  bundleIdPrefix: com.clintkingston
  deploymentTarget:
    iOS: "17.0"
attributes:
  LastUpgradeCheck: "2600"
targets:
  CocoFeed:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        GENERATE_INFOPLIST_FILE: YES
        # Base Info.plist merged with the generated keys — carries the custom UILaunchScreen
        # dict (plant image over the adaptive LaunchBackground colour, same as TentControl).
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.clintkingston.CocoFeed
        DEVELOPMENT_TEAM: FNCTF888W8
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        INFOPLIST_KEY_CFBundleDisplayName: CannaCalc
        # Icon Composer file is Sources/AppIcon.icon — point actool at it by name so the
        # app icon survives xcodegen regeneration.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  CocoFeedTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: CocoFeed
    settings:
      base:
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.clintkingston.CocoFeedTests
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  CocoFeed:
    build:
      targets:
        CocoFeed: all
        CocoFeedTests: [test]
    test:
      targets:
        - CocoFeedTests
